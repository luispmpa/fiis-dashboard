name: Processar Notas XP

on:
  schedule:
    # 17h BRT (20h UTC), segunda a sexta — após fechamento do mercado
    - cron: '0 20 * * 1-5'
  workflow_dispatch:   # permite executar manualmente

jobs:
  processar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: xp_sync/requirements.txt

      - name: Instalar dependências do sistema (pikepdf / QPDF)
        run: sudo apt-get install -y --no-install-recommends libqpdf-dev

      - name: Instalar dependências Python
        run: pip install -r xp_sync/requirements.txt

      - name: Processar notas de negociação XP
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m xp_sync.main
