name: Atualizar dados FIIs & Ações

on:
  schedule:
    - cron: '0 * * * *'   # toda hora
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Atualizar cotações e dividendos
        run: node scripts/update-fiis.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
