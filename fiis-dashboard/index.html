<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carteira FII</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0f14;
    --bg2:      #13161e;
    --bg3:      #1a1e28;
    --border:   #252932;
    --text:     #e8eaf0;
    --muted:    #6b7280;
    --accent:   #4ade80;
    --danger:   #f87171;
    --warn:     #fbbf24;
    --blue:     #60a5fa;
    --mono:     'DM Mono', monospace;
    --sans:     'Sora', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: .04em; color: var(--text); }
  header h1 span { color: var(--accent); }
  #last-update { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  .summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .summary-card {
    background: var(--bg);
    padding: 20px 28px;
  }
  .summary-card .label { font-size: 11px; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
  .summary-card .value { font-family: var(--mono); font-size: 22px; font-weight: 500; }
  .summary-card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

  .table-wrap { overflow-x: auto; padding: 0 0 40px; }

  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  th {
    padding: 10px 16px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: right;
    white-space: nowrap;
  }
  th:first-child, th:nth-child(2), th:nth-child(3) { text-align: left; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  tbody tr:hover { background: var(--bg2); }

  td {
    padding: 13px 16px;
    font-family: var(--mono);
    font-size: 13px;
    text-align: right;
    white-space: nowrap;
  }
  td:first-child { text-align: left; }
  td:nth-child(2) { font-family: var(--sans); font-size: 13px; font-weight: 400; text-align: left; color: var(--muted); }
  td:nth-child(3) { font-family: var(--sans); font-size: 11px; text-align: left; }

  .ticker { font-weight: 500; color: var(--blue); font-size: 13px; }
  .seg-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .04em;
  }
  .seg-papel   { background: rgba(96,165,250,.12); color: #93c5fd; }
  .seg-log     { background: rgba(74,222,128,.10); color: #86efac; }
  .seg-hibrido { background: rgba(251,191,36,.10); color: #fde68a; }
  .seg-shop    { background: rgba(167,139,250,.12); color: #c4b5fd; }
  .seg-varejo  { background: rgba(251,146,60,.10); color: #fed7aa; }

  .up   { color: var(--accent); }
  .down { color: var(--danger); }
  .neutral { color: var(--muted); }

  .signal-buy  { color: var(--accent); font-weight: 600; font-size: 11px; letter-spacing: .05em; }
  .signal-sell { color: var(--danger); font-weight: 600; font-size: 11px; letter-spacing: .05em; }
  .signal-hold { color: var(--warn);   font-weight: 600; font-size: 11px; letter-spacing: .05em; }
  .signal-none { color: var(--muted);  font-size: 11px; }

  /* Carteira edit */
  .qty-cell { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
  input.qty  {
    width: 64px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 8px;
    text-align: right;
    outline: none;
    transition: border .15s;
  }
  input.qty:focus { border-color: var(--blue); }
  input.pm {
    width: 80px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 8px;
    text-align: right;
    outline: none;
    transition: border .15s;
  }
  input.pm:focus { border-color: var(--blue); }

  .save-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    font-family: var(--sans);
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .04em;
  }
  .save-btn:hover { border-color: var(--accent); color: var(--accent); }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
    gap: 12px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .diff-pos { color: var(--accent); }
  .diff-neg { color: var(--danger); }

  @media (max-width: 900px) {
    .summary { grid-template-columns: repeat(2,1fr); }
    header { padding: 14px 16px; }
    th, td { padding: 10px 10px; }
  }
</style>
</head>
<body>

<header>
  <h1>CARTEIRA <span>FII</span></h1>
  <span id="last-update">carregando...</span>
</header>

<div class="summary" id="summary">
  <div class="summary-card"><div class="label">Patrimônio</div><div class="value" id="s-patrimonio">—</div><div class="sub" id="s-patrimonio-sub">total investido</div></div>
  <div class="summary-card"><div class="label">Renda mensal est.</div><div class="value" id="s-renda">—</div><div class="sub">últimos dividendos × cotas</div></div>
  <div class="summary-card"><div class="label">DY médio carteira</div><div class="value" id="s-dy">—</div><div class="sub">ponderado por posição</div></div>
  <div class="summary-card"><div class="label">Resultado</div><div class="value" id="s-resultado">—</div><div class="sub" id="s-resultado-sub">vs. preço médio</div></div>
</div>

<div class="table-wrap">
  <div id="loading" class="loading"><div class="spinner"></div> carregando dados...</div>
  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th>Ticker</th>
        <th>Nome</th>
        <th>Segmento</th>
        <th>Preço atual</th>
        <th>Var. dia</th>
        <th>Var. semana</th>
        <th>Últ. div.</th>
        <th>DY%</th>
        <th>Cotas</th>
        <th>Preço médio</th>
        <th>Posição</th>
        <th>P&L</th>
        <th>Sinal</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const SUPA_URL = 'https://ityrkysliksvvhpvweft.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0eXJreXNsaWtzdnZocHZ3ZWZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzAyMjMsImV4cCI6MjA5MTMwNjIyM30.mWBSzqgB-AYi1XWGmevMmxrm5xUFJ87uefMqwYC184w';

const h = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' };

const fmtBRL  = v => v != null ? 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—';
const fmtPct  = v => v != null ? (v >= 0 ? '+' : '') + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}) + '%' : '—';
const fmtNum  = v => v != null ? Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—';

const segClass = s => {
  if (!s) return '';
  const m = { 'Papel/CRI':'seg-papel','Logística':'seg-log','Híbrido':'seg-hibrido','Shoppings':'seg-shop','Varejo':'seg-varejo' };
  return m[s] || '';
};

async function load() {
  const [mRes, cRes] = await Promise.all([
    fetch(SUPA_URL + '/rest/v1/fiis_mercado?select=*&order=ticker', {headers: h}),
    fetch(SUPA_URL + '/rest/v1/fiis_carteira?select=*', {headers: h})
  ]);
  const mercado  = await mRes.json();
  const carteira = await cRes.json();

  const cart = {};
  carteira.forEach(c => cart[c.ticker] = c);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('main-table').style.display = 'table';

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  let totalPatrimonio = 0, totalCusto = 0, totalRenda = 0;
  let dyNum = 0, dyDen = 0;

  mercado.forEach(r => {
    const c = cart[r.ticker] || { quantidade: 0, preco_medio: 0 };
    const qty = Number(c.quantidade) || 0;
    const pm  = Number(c.preco_medio) || 0;
    const pc  = Number(r.preco_atual) || 0;
    const div = Number(r.ultimo_div)  || 0;

    const posicao = qty * pc;
    const custo   = qty * pm;
    const pl      = pm > 0 ? posicao - custo : null;
    const plPct   = (pm > 0 && custo > 0) ? ((posicao - custo) / custo) * 100 : null;
    const renda   = qty * div;
    const dy      = r.dy_percent;

    totalPatrimonio += posicao;
    totalCusto      += custo;
    totalRenda      += renda;
    if (posicao > 0 && dy) { dyNum += posicao * dy; dyDen += posicao; }

    // Sinal
    let sinal = '<span class="signal-none">—</span>';
    if (pm > 0 && pc > 0) {
      const diff = ((pc - pm) / pm) * 100;
      if (diff < -3)       sinal = '<span class="signal-buy">↓ COMPRAR</span>';
      else if (diff > 5)   sinal = '<span class="signal-sell">↑ VENDER</span>';
      else                 sinal = '<span class="signal-hold">→ MANTER</span>';
    }

    const varDiaClass    = r.var_dia    >= 0 ? 'up' : 'down';
    const varSemClass    = r.var_semanal >= 0 ? 'up' : 'down';
    const plClass        = pl != null ? (pl >= 0 ? 'diff-pos' : 'diff-neg') : '';

    const tr = document.createElement('tr');
    tr.dataset.ticker = r.ticker;
    tr.innerHTML = `
      <td><span class="ticker">${r.ticker}</span></td>
      <td>${r.nome || '—'}</td>
      <td><span class="seg-pill ${segClass(r.segmento)}">${r.segmento || '—'}</span></td>
      <td>${fmtBRL(r.preco_atual)}</td>
      <td class="${varDiaClass}">${r.var_dia != null ? fmtPct(r.var_dia) : '—'}</td>
      <td class="${varSemClass}">${r.var_semanal != null ? fmtPct(r.var_semanal) : '—'}</td>
      <td>${fmtBRL(r.ultimo_div)}</td>
      <td>${dy != null ? fmtNum(dy) + '%' : '—'}</td>
      <td class="qty-cell"><input class="qty" type="number" min="0" step="1" value="${qty}" data-ticker="${r.ticker}"></td>
      <td class="qty-cell"><input class="pm" type="number" min="0" step="0.01" value="${pm > 0 ? pm : ''}" placeholder="0,00" data-ticker="${r.ticker}"></td>
      <td>${qty > 0 ? fmtBRL(posicao) : '—'}</td>
      <td class="${plClass}">${pl != null ? fmtBRL(pl) + (plPct != null ? ' (' + fmtPct(plPct) + ')' : '') : '—'}</td>
      <td>${sinal}</td>
      <td><button class="save-btn" data-ticker="${r.ticker}">salvar</button></td>
    `;
    tbody.appendChild(tr);
  });

  // Summary
  document.getElementById('s-patrimonio').textContent     = fmtBRL(totalPatrimonio);
  document.getElementById('s-patrimonio-sub').textContent = 'custo: ' + fmtBRL(totalCusto);
  document.getElementById('s-renda').textContent          = fmtBRL(totalRenda) + '/mês';
  document.getElementById('s-dy').textContent             = dyDen > 0 ? fmtNum(dyNum / dyDen) + '%' : '—';

  const totalPL    = totalPatrimonio - totalCusto;
  const totalPLPct = totalCusto > 0 ? (totalPL / totalCusto) * 100 : null;
  const resEl = document.getElementById('s-resultado');
  resEl.textContent = fmtBRL(totalPL);
  resEl.className   = 'value ' + (totalPL >= 0 ? 'up' : 'down');
  document.getElementById('s-resultado-sub').textContent = totalPLPct != null ? fmtPct(totalPLPct) : 'insira preço médio';

  // Update time
  const datas = mercado.filter(r => r.atualizado_em).map(r => r.atualizado_em);
  if (datas.length) {
    const d = new Date(Math.max(...datas.map(d => new Date(d))));
    document.getElementById('last-update').textContent =
      'atualizado ' + d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  } else {
    document.getElementById('last-update').textContent = 'dados pendentes de atualização';
  }

  // Save buttons
  document.querySelectorAll('.save-btn').forEach(btn => {
    btn.addEventListener('click', () => saveCarteira(btn.dataset.ticker));
  });
}

async function saveCarteira(ticker) {
  const qty = Number(document.querySelector(`input.qty[data-ticker="${ticker}"]`).value) || 0;
  const pm  = Number(document.querySelector(`input.pm[data-ticker="${ticker}"]`).value)  || 0;

  await fetch(SUPA_URL + '/rest/v1/fiis_carteira?ticker=eq.' + ticker, {
    method: 'PATCH',
    headers: { ...h, 'Prefer': 'return=minimal' },
    body: JSON.stringify({ quantidade: qty, preco_medio: pm })
  });

  // Feedback visual
  const btn = document.querySelector(`.save-btn[data-ticker="${ticker}"]`);
  const orig = btn.textContent;
  btn.textContent = '✓';
  btn.style.color = '#4ade80';
  btn.style.borderColor = '#4ade80';
  setTimeout(() => { btn.textContent = orig; btn.style.color = ''; btn.style.borderColor = ''; load(); }, 800);
}

load();
</script>
</body>
</html>
